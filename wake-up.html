<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — Wake-Up Call | Browns Hotels & Resorts</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if(localStorage.getItem('vb:theme')==='dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52' }
        }
      }
    }
  </script>
  <style>
    /* ── Clock picker theme tokens ── */
    :root {
      --ck-outer:    #e2e8f0;
      --ck-face:     #ffffff;
      --ck-inner:    #f8fafc;
      --ck-border:   #cbd5e1;
      --ck-maj:      #94a3b8;
      --ck-min:      #e2e8f0;
      --ck-num:      #475569;
      --ck-arc-glow: rgba(20,184,166,.18);
    }
    html.dark {
      --ck-outer:    #08131b;
      --ck-face:     #0f2535;
      --ck-inner:    #08131b;
      --ck-border:   #1b3a4f;
      --ck-maj:      #2a5060;
      --ck-min:      #193040;
      --ck-num:      #3d6878;
      --ck-arc-glow: #0d4a42;
    }
    #clock-svg .ck-outer { fill: var(--ck-outer); }
    #clock-svg .ck-face  { fill: var(--ck-face);  stroke: var(--ck-border); }
    #clock-svg .ck-inner { fill: var(--ck-inner); stroke: var(--ck-border); }
    #clock-ticks .ck-maj { stroke: var(--ck-maj); }
    #clock-ticks .ck-min { stroke: var(--ck-min); }
    #clock-numbers text          { fill: var(--ck-num); font-weight: 600; }
    #clock-numbers text.ck-sel   { fill: #14b8a6;       font-weight: 800; }
    #clock-arc-glow              { stroke: var(--ck-arc-glow); }
  </style>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <div id="app-header"></div>
  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8">
      <div class="max-w-xl mx-auto">

        <!-- Page Header -->
        <div class="mb-6">
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Concierge</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-symbols-outlined fill-icon text-[#003c52] dark:text-teal-400 text-3xl">alarm</span>
            Wake-Up Call
          </h1>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Our team will call your room at the time you choose.</p>
        </div>

        <!-- ─── Schedule Form ──────────────────────────────────────────────── -->
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 mb-6">
          <h2 class="font-bold text-slate-900 dark:text-white mb-5 flex items-center gap-2 text-base">
            <span class="w-7 h-7 rounded-full bg-[#003c52]/10 dark:bg-teal-900/30 flex items-center justify-center">
              <span class="material-symbols-outlined text-sm text-[#003c52] dark:text-teal-400">add</span>
            </span>
            Schedule Wake-Up Call
          </h2>

          <div class="space-y-4">

            <!-- Date (full width) -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Date <span class="text-red-500">*</span></label>
              <input type="date" id="wakeup-date" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#003c52]">
            </div>

            <!-- Clock Time Picker -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Time <span class="text-red-500">*</span></label>
              <input type="hidden" id="wakeup-time" value="07:00">

              <!-- Clock face + arrows -->
              <div class="flex items-center justify-center gap-2">

                <!-- Step back -->
                <button type="button" onclick="stepClockTime(-1)"
                        class="w-9 h-9 md:w-11 md:h-11 rounded-full border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 hover:border-[#003c52] hover:text-[#003c52] dark:hover:border-teal-500 dark:hover:text-teal-400 transition-all shrink-0">
                  <span class="material-symbols-outlined text-xl">chevron_left</span>
                </button>

                <!-- SVG Clock -->
                <div class="relative shrink-0 w-48 h-48 md:w-[220px] md:h-[220px]">
                  <svg id="clock-svg" viewBox="0 0 300 300" class="w-full h-full select-none cursor-pointer"
                       onclick="handleClockFaceClick(event)">
                    <!-- Outer shadow ring -->
                    <circle class="ck-outer" cx="150" cy="150" r="149"/>
                    <!-- Main face -->
                    <circle class="ck-face" cx="150" cy="150" r="145" stroke-width="1.5"/>
                    <!-- Tick marks — JS generated -->
                    <g id="clock-ticks"></g>
                    <!-- Arc glow (wide, dim) -->
                    <path id="clock-arc-glow" d="" fill="none" stroke-width="12" stroke-linecap="round"/>
                    <!-- Arc bright -->
                    <path id="clock-arc" d="" fill="none" stroke="#14b8a6" stroke-width="5" stroke-linecap="round"/>
                    <!-- Dot at arc tip -->
                    <circle id="clock-dot" cx="150" cy="17" r="7.5" fill="#14b8a6"/>
                    <circle id="clock-dot-inner" cx="150" cy="17" r="3.5" fill="white"/>
                    <!-- Hour numbers — JS generated -->
                    <g id="clock-numbers"></g>
                    <!-- Inner face -->
                    <circle class="ck-inner" cx="150" cy="150" r="84" stroke-width="1"/>
                  </svg>

                  <!-- Digital overlay (HTML over SVG) -->
                  <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <span class="material-symbols-outlined fill-icon text-teal-400 text-[1.6rem] leading-none">alarm</span>
                    <div class="flex items-end gap-0.5 mt-1">
                      <span id="clock-display-time"
                            class="font-black leading-none text-slate-900 dark:text-slate-100"
                            style="font-size:clamp(1.5rem,4vw,2rem);letter-spacing:-1px">07:00</span>
                      <button id="clock-ampm-btn" type="button" onclick="toggleClockAmPm()"
                              class="pointer-events-auto text-[11px] font-bold text-teal-400 hover:text-teal-300 transition-colors pb-0.5 ml-1">AM</button>
                    </div>
                  </div>
                </div>

                <!-- Step forward -->
                <button type="button" onclick="stepClockTime(1)"
                        class="w-9 h-9 md:w-11 md:h-11 rounded-full border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 hover:border-[#003c52] hover:text-[#003c52] dark:hover:border-teal-500 dark:hover:text-teal-400 transition-all shrink-0">
                  <span class="material-symbols-outlined text-xl">chevron_right</span>
                </button>

              </div>

              <!-- Quick presets -->
              <div class="flex flex-wrap gap-1.5 justify-center mt-3">
                <span class="text-[11px] text-slate-400 self-center mr-0.5">Quick:</span>
                <button type="button" onclick="setClockTime(5,0,'AM')" class="text-[11px] px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition">5:00 AM</button>
                <button type="button" onclick="setClockTime(6,0,'AM')" class="text-[11px] px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition">6:00 AM</button>
                <button type="button" onclick="setClockTime(7,0,'AM')" class="text-[11px] px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition">7:00 AM</button>
                <button type="button" onclick="setClockTime(8,0,'AM')" class="text-[11px] px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition">8:00 AM</button>
                <button type="button" onclick="setClockTime(9,0,'AM')" class="text-[11px] px-2.5 py-1 rounded-full border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-teal-500 hover:text-teal-600 dark:hover:text-teal-400 transition">9:00 AM</button>
              </div>
            </div>

            <!-- Repeat -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Repeat</label>
              <div class="space-y-2">
                <label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer hover:border-[#003c52] dark:hover:border-teal-400 transition has-[:checked]:border-[#003c52] has-[:checked]:bg-[#003c52]/5 dark:has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/20">
                  <input type="radio" name="repeat" value="once" checked class="accent-[#003c52]">
                  <span class="material-symbols-outlined text-lg text-slate-400">looks_one</span>
                  <div>
                    <p class="text-sm font-semibold text-slate-900 dark:text-white">Once</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Single alarm on the selected date</p>
                  </div>
                </label>
                <label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer hover:border-[#003c52] dark:hover:border-teal-400 transition has-[:checked]:border-[#003c52] has-[:checked]:bg-[#003c52]/5 dark:has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/20">
                  <input type="radio" name="repeat" value="daily" class="accent-[#003c52]">
                  <span class="material-symbols-outlined text-lg text-slate-400">repeat</span>
                  <div>
                    <p class="text-sm font-semibold text-slate-900 dark:text-white">Daily (rest of stay)</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Every morning until check-out</p>
                  </div>
                </label>
                <label class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer hover:border-[#003c52] dark:hover:border-teal-400 transition has-[:checked]:border-[#003c52] has-[:checked]:bg-[#003c52]/5 dark:has-[:checked]:border-teal-400 dark:has-[:checked]:bg-teal-900/20">
                  <input type="radio" name="repeat" value="weekdays" class="accent-[#003c52]">
                  <span class="material-symbols-outlined text-lg text-slate-400">calendar_today</span>
                  <div>
                    <p class="text-sm font-semibold text-slate-900 dark:text-white">Weekdays Only</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Monday through Friday</p>
                  </div>
                </label>
              </div>
            </div>

            <!-- Notes -->
            <div>
              <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Notes <span class="text-slate-400 font-normal">(optional)</span></label>
              <textarea id="wakeup-notes" rows="2" placeholder="e.g. Gentle knock first, hot coffee please…" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#003c52] placeholder:text-slate-400 resize-none text-sm"></textarea>
            </div>

            <button onclick="scheduleWakeUp()" class="w-full bg-[#003c52] text-white rounded-xl px-6 py-3 font-bold hover:bg-[#004f6e] transition shadow-sm flex items-center justify-center gap-2">
              <span class="material-symbols-outlined fill-icon">alarm_add</span>
              Set Wake-Up Call
            </button>

          </div>
        </div>

        <!-- ─── Scheduled Calls ────────────────────────────────────────────── -->
        <div>
          <div class="flex items-center gap-2 mb-4">
            <span class="material-symbols-outlined text-[#003c52] dark:text-teal-400">alarm_on</span>
            <h2 class="text-lg font-bold text-slate-900 dark:text-white">Scheduled Calls</h2>
          </div>
          <div id="calls-list"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'wake-up');
    App.bottomNav.render('services');

    let reservation = null;

    // ─── Clock Picker ──────────────────────────────────────────────────────
    const clock = { hour: 7, minute: 0, ampm: 'AM' };
    const CLOCK_CX = 150, CLOCK_CY = 150, TICK_R = 133;

    function getArcPath(angleDeg, r) {
      if (angleDeg <= 0) return '';
      if (angleDeg >= 360) angleDeg = 359.9;
      const startRad = -Math.PI / 2;
      const endRad   = (angleDeg - 90) * Math.PI / 180;
      const x1 = CLOCK_CX + r * Math.cos(startRad);
      const y1 = CLOCK_CY + r * Math.sin(startRad);
      const x2 = CLOCK_CX + r * Math.cos(endRad);
      const y2 = CLOCK_CY + r * Math.sin(endRad);
      const large = angleDeg > 180 ? 1 : 0;
      return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
    }

    function initClockSVG() {
      const ticksG = document.getElementById('clock-ticks');
      const numsG  = document.getElementById('clock-numbers');
      const NS     = 'http://www.w3.org/2000/svg';

      // 60 tick marks
      for (let i = 0; i < 60; i++) {
        const major = i % 5 === 0;
        const angle = (i * 6 - 90) * Math.PI / 180;
        const r1 = TICK_R;
        const r2 = major ? TICK_R - 13 : TICK_R - 6;
        const line = document.createElementNS(NS, 'line');
        line.setAttribute('x1', (CLOCK_CX + r1 * Math.cos(angle)).toFixed(2));
        line.setAttribute('y1', (CLOCK_CY + r1 * Math.sin(angle)).toFixed(2));
        line.setAttribute('x2', (CLOCK_CX + r2 * Math.cos(angle)).toFixed(2));
        line.setAttribute('y2', (CLOCK_CY + r2 * Math.sin(angle)).toFixed(2));
        line.setAttribute('class', major ? 'ck-maj' : 'ck-min');
        line.setAttribute('stroke-width', major ? '2' : '1');
        line.setAttribute('stroke-linecap', 'round');
        ticksG.appendChild(line);
      }

      // Hour numbers 1–12
      const numR = 108;
      for (let h = 1; h <= 12; h++) {
        const angle = (h * 30 - 90) * Math.PI / 180;
        const text = document.createElementNS(NS, 'text');
        text.setAttribute('x', (CLOCK_CX + numR * Math.cos(angle)).toFixed(2));
        text.setAttribute('y', (CLOCK_CY + numR * Math.sin(angle) + 5.5).toFixed(2));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-family', 'Inter, sans-serif');
        text.setAttribute('font-size', '15');
        text.setAttribute('data-hour', h);
        text.textContent = h;
        numsG.appendChild(text);
      }

      updateClockDisplay();
    }

    function updateClockDisplay() {
      const hourAngle = (clock.hour % 12) * 30 + clock.minute * 0.5;
      const arcPath   = getArcPath(hourAngle, TICK_R);

      document.getElementById('clock-arc-glow').setAttribute('d', arcPath);
      document.getElementById('clock-arc').setAttribute('d', arcPath);

      // Move dot to arc tip
      const dotAngle = (hourAngle - 90) * Math.PI / 180;
      const dotX = CLOCK_CX + TICK_R * Math.cos(dotAngle);
      const dotY = CLOCK_CY + TICK_R * Math.sin(dotAngle);
      document.getElementById('clock-dot').setAttribute('cx', dotX.toFixed(2));
      document.getElementById('clock-dot').setAttribute('cy', dotY.toFixed(2));
      document.getElementById('clock-dot-inner').setAttribute('cx', dotX.toFixed(2));
      document.getElementById('clock-dot-inner').setAttribute('cy', dotY.toFixed(2));

      // Highlight selected hour number
      const selHour = clock.hour % 12 || 12;
      document.querySelectorAll('#clock-numbers text').forEach(t => {
        t.classList.toggle('ck-sel', parseInt(t.getAttribute('data-hour')) === selHour);
      });

      // Digital display
      const timeStr = `${String(clock.hour).padStart(2,'0')}:${String(clock.minute).padStart(2,'0')}`;
      document.getElementById('clock-display-time').textContent = timeStr;
      document.getElementById('clock-ampm-btn').textContent = clock.ampm;

      // Sync hidden input (24-hour format)
      let h24 = clock.hour;
      if (clock.ampm === 'AM') { if (h24 === 12) h24 = 0; }
      else                     { if (h24 !== 12) h24 += 12; }
      document.getElementById('wakeup-time').value =
        `${String(h24).padStart(2,'0')}:${String(clock.minute).padStart(2,'0')}`;
    }

    function stepClockTime(minutes) {
      let h24 = clock.hour;
      if (clock.ampm === 'AM') { if (h24 === 12) h24 = 0; }
      else                     { if (h24 !== 12) h24 += 12; }
      let total = ((h24 * 60 + clock.minute + minutes) % 1440 + 1440) % 1440;
      const h = Math.floor(total / 60), m = total % 60;
      if      (h === 0)  { clock.hour = 12; clock.ampm = 'AM'; }
      else if (h < 12)   { clock.hour = h;  clock.ampm = 'AM'; }
      else if (h === 12) { clock.hour = 12; clock.ampm = 'PM'; }
      else               { clock.hour = h - 12; clock.ampm = 'PM'; }
      clock.minute = m;
      updateClockDisplay();
    }

    function toggleClockAmPm() {
      clock.ampm = clock.ampm === 'AM' ? 'PM' : 'AM';
      updateClockDisplay();
    }

    function setClockTime(hour, minute, ampm) {
      clock.hour = hour; clock.minute = minute; clock.ampm = ampm;
      updateClockDisplay();
    }

    function handleClockFaceClick(event) {
      const svg  = document.getElementById('clock-svg');
      const rect = svg.getBoundingClientRect();
      const dx   = ((event.clientX - rect.left) / rect.width)  * 300 - CLOCK_CX;
      const dy   = ((event.clientY - rect.top)  / rect.height) * 300 - CLOCK_CY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 84 || dist > 145) return;
      let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
      if (angle < 0) angle += 360;
      clock.hour = Math.round(angle / 30) % 12 || 12;
      updateClockDisplay();
    }
    // ─── End Clock Picker ─────────────────────────────────────────────────

    function init() {
      reservation = App.reservations.getActive();

      // Default date = tomorrow
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowStr = tomorrow.toISOString().split('T')[0];
      const todayStr = new Date().toISOString().split('T')[0];

      App.datepicker.date('#wakeup-date', { minDate: todayStr, defaultDate: tomorrowStr });
      initClockSVG();

      renderCallsList();
    }

    function scheduleWakeUp() {
      const date  = document.getElementById('wakeup-date').value;
      const time  = document.getElementById('wakeup-time').value;
      const repeat = document.querySelector('input[name="repeat"]:checked')?.value || 'once';
      const notes = document.getElementById('wakeup-notes').value.trim();

      if (!date || !time) {
        App.toast.show('Please select a date and time.', 'error');
        return;
      }
      if (!reservation) {
        App.toast.show('No active reservation found.', 'error');
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const selectedDate = new Date(date);
      selectedDate.setHours(0, 0, 0, 0);
      if (selectedDate < today) {
        App.toast.show('Please select today or a future date.', 'error');
        return;
      }

      App.wakeUpCalls.add({ reservationId: reservation.id, date, time, repeat, notes });

      // Format date for toast
      const formatted = App.helpers.formatDate ? App.helpers.formatDate(date) : date;
      App.toast.show(`Wake-up call set for ${time} on ${formatted}.`, 'success');

      // Reset notes, keep date/time for convenience
      document.getElementById('wakeup-notes').value = '';

      renderCallsList();
    }

    function renderCallsList() {
      const el = document.getElementById('calls-list');
      if (!reservation) {
        el.innerHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center">
            <span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-600">hotel</span>
            <p class="mt-3 text-slate-500 dark:text-slate-400 text-sm">No active reservation.</p>
          </div>`;
        return;
      }

      const calls = App.wakeUpCalls.getAll(reservation.id);

      if (!calls.length) {
        el.innerHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center">
            <span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-600">alarm_off</span>
            <p class="mt-3 font-semibold text-slate-500 dark:text-slate-400 text-sm">No wake-up calls scheduled yet.</p>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">Use the form above to set your first alarm.</p>
          </div>`;
        return;
      }

      el.innerHTML = `<div class="space-y-3">
        ${calls.map(call => {
          const isCancelled = call.status === 'cancelled';
          const repeatLabels = { once: 'Once', daily: 'Daily (rest of stay)', weekdays: 'Weekdays only' };
          const repeatLabel = repeatLabels[call.repeat] || call.repeat || 'Once';
          const formatted = App.helpers.formatDate ? App.helpers.formatDate(call.date) : call.date;

          const statusBadge = isCancelled
            ? `<span class="text-xs font-bold px-2.5 py-1 rounded-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400">Cancelled</span>`
            : `<span class="text-xs font-bold px-2.5 py-1 rounded-full bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-400">Scheduled</span>`;

          return `
          <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border ${isCancelled ? 'border-slate-200 dark:border-slate-700 opacity-60' : 'border-slate-200 dark:border-slate-700'} p-4">
            <div class="flex items-center gap-4">
              <!-- Time display -->
              <div class="w-16 h-16 rounded-xl ${isCancelled ? 'bg-slate-100 dark:bg-slate-800' : 'bg-[#003c52]/10 dark:bg-teal-900/30'} flex flex-col items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-xl ${isCancelled ? 'text-slate-400' : 'text-[#003c52] dark:text-teal-400'} fill-icon">alarm</span>
                <span class="text-xs font-bold ${isCancelled ? 'text-slate-400' : 'text-[#003c52] dark:text-teal-400'} mt-0.5">${call.time}</span>
              </div>
              <!-- Details -->
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-0.5">
                  <span class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">${call.time}</span>
                  ${statusBadge}
                </div>
                <p class="text-sm text-slate-600 dark:text-slate-400">${formatted}</p>
                <div class="flex items-center gap-3 mt-1 text-xs text-slate-500 dark:text-slate-500">
                  <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">repeat</span>${repeatLabel}</span>
                  ${call.notes ? `<span class="flex items-center gap-1 truncate max-w-[160px]"><span class="material-symbols-outlined text-sm">notes</span>${call.notes}</span>` : ''}
                </div>
              </div>
              <!-- Cancel button -->
              ${!isCancelled ? `
              <button onclick="cancelCall('${call.id}')" class="shrink-0 w-9 h-9 rounded-full flex items-center justify-center text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-600 transition" title="Cancel wake-up call">
                <span class="material-symbols-outlined text-xl">alarm_off</span>
              </button>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    function cancelCall(id) {
      if (!confirm('Cancel this wake-up call?')) return;
      App.wakeUpCalls.cancel(id);
      App.toast.show('Wake-up call cancelled.', 'info');
      renderCallsList();
    }

    init();
  </script>
</body>
</html>
