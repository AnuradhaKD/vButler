<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — My Reservations | Browns Hotels & Resorts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52', 'bg-light': '#f5f8f8', 'bg-dark': '#0f1e23' }
        }
      }
    }
  </script>
  <style>.fill-icon { font-variation-settings: 'FILL' 1; }</style>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <script>
    if (localStorage.getItem('vb:theme') === 'dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
  </script>

  <div id="app-header"></div>
  <div class="flex">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-5xl">

      <!-- Page header -->
      <div class="mb-8">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2">Your Stays</p>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 dark:text-white">My Reservations</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Manage all your current and upcoming bookings.</p>
      </div>

      <!-- Stats row -->
      <div id="stats-row" class="grid grid-cols-3 gap-3 mb-8"></div>

      <!-- Reservation list -->
      <div id="reservation-list" class="space-y-4"></div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'reservations');
    App.bottomNav.render('reservations');

    async function init() {
      const session = App.auth.getSession();
      let reservations = App.reservations.getAll();

      if (!reservations.length) {
        const data = await App.data.loadReservations();
        if (data) {
          reservations = data.reservations.filter(r => r.guestEmail === session.email);
          App.reservations.save(reservations);
          if (reservations.length > 0) App.reservations.setActive(reservations[0].id);
        }
      }

      renderStats(reservations);
      renderList(reservations);
    }

    function renderStats(reservations) {
      const el = document.getElementById('stats-row');
      const total = reservations.length;
      const upcoming = reservations.filter(r => r.status === 'upcoming').length;
      const active = reservations.filter(r => r.status === 'active').length;
      const totalBalance = reservations.reduce((sum, r) => sum + (r.balance || 0), 0);

      el.innerHTML = [
        { label: 'Total Stays', value: total, icon: 'hotel', color: 'text-[#003c52] dark:text-teal-400', bg: 'bg-[#003c52]/8 dark:bg-teal-900/20' },
        { label: 'Upcoming', value: upcoming + active, icon: 'schedule', color: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-900/20' },
        { label: 'Balance Due', value: 'Rs. ' + totalBalance.toLocaleString(), icon: 'receipt_long', color: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/20' }
      ].map(s => `
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-4 text-center">
          <div class="w-9 h-9 rounded-lg ${s.bg} flex items-center justify-center mx-auto mb-2">
            <span class="material-symbols-outlined text-lg ${s.color}">${s.icon}</span>
          </div>
          <p class="text-lg font-bold text-slate-900 dark:text-white">${s.value}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">${s.label}</p>
        </div>`).join('');
    }

    function renderList(reservations) {
      const el = document.getElementById('reservation-list');
      const activeId = App.storage.get('vb:activeReservation');

      if (!reservations.length) {
        el.innerHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-12 text-center">
            <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600 mb-4 block">hotel</span>
            <p class="text-slate-700 dark:text-slate-300 font-semibold mb-1">No reservations found</p>
            <p class="text-slate-400 dark:text-slate-500 text-sm">Your reservations will appear here once linked to your account.</p>
          </div>`;
        return;
      }

      el.innerHTML = reservations.map(res => {
        const isActive = res.id === activeId;
        const nights = Math.round((new Date(res.checkOut) - new Date(res.checkIn)) / 86400000);
        const preArrival = App.preArrival.get(res.id);
        const preArrivalDone = res.preArrivalComplete || Object.keys(preArrival).length > 3;

        return `
          <div class="bg-white dark:bg-slate-900 rounded-2xl border ${isActive ? 'border-[#003c52] dark:border-teal-500 ring-1 ring-[#003c52]/20 dark:ring-teal-500/20' : 'border-slate-200 dark:border-slate-700'} overflow-hidden hover:shadow-md transition-shadow">
            <!-- Active indicator -->
            ${isActive ? `<div class="bg-[#003c52] dark:bg-teal-600 px-4 py-2 flex items-center gap-2">
              <span class="material-symbols-outlined text-sm text-white fill-icon">check_circle</span>
              <span class="text-white text-xs font-semibold uppercase tracking-wider">Active Stay</span>
            </div>` : ''}

            <div class="p-5 md:p-6">
              <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex items-start gap-3 mb-3">
                    <div class="w-10 h-10 rounded-xl bg-[#003c52]/8 dark:bg-teal-900/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                      <span class="material-symbols-outlined text-xl text-[#003c52] dark:text-teal-400">hotel</span>
                    </div>
                    <div>
                      <h3 class="font-bold text-slate-900 dark:text-white text-base leading-tight">${res.propertyName}</h3>
                      <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${res.propertyCity}</p>
                    </div>
                    <div class="ml-auto">${App.helpers.statusBadge(res.status)}</div>
                  </div>

                  <!-- Dates + room -->
                  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    <div>
                      <p class="text-xs text-slate-400 dark:text-slate-500 mb-0.5">Check-in</p>
                      <p class="text-sm font-semibold text-slate-900 dark:text-white">${App.helpers.formatDate(res.checkIn)}</p>
                    </div>
                    <div>
                      <p class="text-xs text-slate-400 dark:text-slate-500 mb-0.5">Check-out</p>
                      <p class="text-sm font-semibold text-slate-900 dark:text-white">${App.helpers.formatDate(res.checkOut)}</p>
                    </div>
                    <div>
                      <p class="text-xs text-slate-400 dark:text-slate-500 mb-0.5">Duration</p>
                      <p class="text-sm font-semibold text-slate-900 dark:text-white">${nights} night${nights !== 1 ? 's' : ''}</p>
                    </div>
                    <div>
                      <p class="text-xs text-slate-400 dark:text-slate-500 mb-0.5">Room</p>
                      <p class="text-sm font-semibold text-slate-900 dark:text-white truncate">${res.roomNumber ? 'Room ' + res.roomNumber : '—'}</p>
                    </div>
                  </div>

                  <!-- Room type -->
                  <p class="text-xs text-slate-500 dark:text-slate-400 mb-3 flex items-center gap-1.5">
                    <span class="material-symbols-outlined text-sm">bed</span> ${res.roomType}
                    <span class="mx-1 text-slate-300 dark:text-slate-600">·</span>
                    <span class="material-symbols-outlined text-sm">person</span> ${res.adults} Adult${res.adults !== 1 ? 's' : ''}${res.children ? ', ' + res.children + ' Child' : ''}
                    <span class="mx-1 text-slate-300 dark:text-slate-600">·</span>
                    Ref: <span class="font-semibold text-[#003c52] dark:text-teal-400">${res.bookingReference}</span>
                  </p>

                  <!-- Pre-arrival status -->
                  <div class="flex items-center gap-2 p-3 rounded-lg ${preArrivalDone ? 'bg-green-50 dark:bg-green-900/20' : 'bg-amber-50 dark:bg-amber-900/20'}">
                    <span class="material-symbols-outlined text-sm ${preArrivalDone ? 'text-green-600 dark:text-green-400' : 'text-amber-600 dark:text-amber-400'}">${preArrivalDone ? 'check_circle' : 'pending'}</span>
                    <span class="text-xs font-medium ${preArrivalDone ? 'text-green-700 dark:text-green-400' : 'text-amber-700 dark:text-amber-400'}">
                      Pre-arrival checklist ${preArrivalDone ? 'complete' : 'not yet completed'}
                    </span>
                    ${!preArrivalDone ? `<a href="pre-arrival.html?id=${res.id}" class="ml-auto text-xs font-semibold text-amber-700 dark:text-amber-400 underline">Complete now</a>` : ''}
                  </div>
                </div>
              </div>

              <!-- Actions -->
              <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                <a href="reservation-detail.html?id=${res.id}" class="flex-1 md:flex-none inline-flex items-center justify-center gap-2 bg-[#003c52] text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-[#004f6e] transition">
                  <span class="material-symbols-outlined text-base">info</span> View Details
                </a>
                ${!isActive ? `
                <button onclick="setActive('${res.id}')" class="flex-1 md:flex-none inline-flex items-center justify-center gap-2 border border-[#003c52] text-[#003c52] dark:border-teal-500 dark:text-teal-400 rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-[#003c52]/5 transition">
                  <span class="material-symbols-outlined text-base">check_circle</span> Set as Active
                </button>` : ''}
                <a href="billing.html?id=${res.id}" class="flex-1 md:flex-none inline-flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition">
                  <span class="material-symbols-outlined text-base">receipt_long</span> View Bill
                </a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function setActive(id) {
      App.reservations.setActive(id);
      App.toast.show('Active reservation updated.', 'success');
      // Re-render
      App.header.render('app-header');
      renderList(App.reservations.getAll());
      renderStats(App.reservations.getAll());
    }

    init();
  </script>
</body>
</html>
