<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — Services | Browns Hotels & Resorts</title>
  <script>
    if(localStorage.getItem('vb:theme')==='dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52' }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <div id="app-header"></div>
  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8">

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Hotel Services</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Services Catalog</h1>
        </div>
        <a href="my-requests.html" class="flex items-center gap-2 border border-[#003c52] text-[#003c52] dark:border-teal-400 dark:text-teal-400 rounded-xl px-4 py-2.5 text-sm font-semibold hover:bg-[#003c52]/5 transition">
          <span class="material-symbols-outlined text-base">assignment</span>
          My Requests
        </a>
      </div>

      <!-- Loading skeleton -->
      <div id="loading-state">
        <div class="flex gap-3 mb-6 overflow-x-auto pb-2">
          <div class="h-9 w-28 bg-slate-200 dark:bg-slate-700 rounded-full animate-pulse shrink-0"></div>
          <div class="h-9 w-28 bg-slate-200 dark:bg-slate-700 rounded-full animate-pulse shrink-0"></div>
          <div class="h-9 w-28 bg-slate-200 dark:bg-slate-700 rounded-full animate-pulse shrink-0"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          ${[1,2,3,4,5,6].map(()=>`
          <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 animate-pulse">
            <div class="h-5 bg-slate-200 dark:bg-slate-700 rounded w-3/4 mb-3"></div>
            <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full mb-2"></div>
            <div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-2/3 mb-4"></div>
            <div class="h-9 bg-slate-200 dark:bg-slate-700 rounded-lg w-28"></div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Content -->
      <div id="content-state" class="hidden">
        <!-- Filter chips -->
        <div id="filter-chips" class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide"></div>
        <!-- Services grid -->
        <div id="services-grid"></div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'services');
    App.bottomNav.render('services');

    let activeCategory = 'all';
    let propData = null;

    async function init() {
      const reservation = App.reservations.getActive();
      const propertyId = reservation?.propertyId || 'newburge-ella';
      propData = await App.data.loadProperty(propertyId);

      if (!propData) {
        document.getElementById('loading-state').innerHTML = `
          <div class="text-center py-20">
            <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">error</span>
            <p class="mt-4 text-slate-500 dark:text-slate-400">Failed to load services. Please refresh.</p>
          </div>`;
        return;
      }

      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('content-state').classList.remove('hidden');

      renderFilters(propData.services.categories);
      renderServices(propData.services.categories);
    }

    function renderFilters(categories) {
      const chips = document.getElementById('filter-chips');
      const allChip = makeChip('all', 'layers', 'All Services');
      chips.innerHTML = allChip;
      categories.forEach(cat => {
        chips.innerHTML += makeChip(cat.id, cat.icon, cat.label);
      });
      chips.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          chips.querySelectorAll('button').forEach(b => setChipInactive(b));
          setChipActive(btn);
          renderServices(categories);
        });
      });
    }

    function makeChip(id, icon, label) {
      const isActive = id === activeCategory;
      return `<button data-cat="${id}" class="flex items-center gap-1.5 shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition ${isActive ? 'bg-[#003c52] text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-[#003c52] hover:text-[#003c52]'}">
        <span class="material-symbols-outlined text-base">${icon}</span>${label}
      </button>`;
    }

    function setChipActive(btn) {
      btn.className = 'flex items-center gap-1.5 shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition bg-[#003c52] text-white';
    }
    function setChipInactive(btn) {
      btn.className = 'flex items-center gap-1.5 shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:border-[#003c52] hover:text-[#003c52]';
    }

    function renderServices(categories) {
      const grid = document.getElementById('services-grid');
      const filtered = activeCategory === 'all' ? categories : categories.filter(c => c.id === activeCategory);
      let html = '';
      filtered.forEach(cat => {
        html += `<div class="mb-8">
          <div class="flex items-center gap-2 mb-4">
            <span class="material-symbols-outlined text-[#003c52] dark:text-teal-400">${cat.icon}</span>
            <h2 class="text-lg font-bold text-slate-900 dark:text-white">${cat.label}</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            ${cat.items.map(item => renderServiceCard(item, cat.id)).join('')}
          </div>
        </div>`;
      });
      grid.innerHTML = html;
    }

    function renderServiceCard(item, categoryId) {
      const currency = propData.property.currencySymbol || 'Rs.';
      const priceDisplay = item.price ? `<span class="font-bold text-[#003c52] dark:text-teal-400">${App.helpers.formatCurrency(item.price, currency)}</span>` : `<span class="text-green-600 dark:text-green-400 font-semibold">${item.priceNote || ''}</span>`;
      return `
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 flex flex-col gap-3 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-3">
            <h3 class="font-bold text-slate-900 dark:text-white text-base leading-tight">${item.name}</h3>
            <div class="text-right shrink-0">${priceDisplay}</div>
          </div>
          <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed flex-1">${item.description}</p>
          <div class="flex flex-wrap gap-3 text-xs text-slate-500 dark:text-slate-400">
            ${item.estimatedTime ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span>${item.estimatedTime}</span>` : ''}
            ${item.availableHours ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">access_time</span>${item.availableHours.from}–${item.availableHours.to}</span>` : ''}
          </div>
          <a href="service-request.html?serviceId=${item.id}&categoryId=${categoryId}" class="mt-1 inline-flex items-center justify-center gap-2 bg-[#003c52] text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-[#004f6e] transition w-full">
            <span class="material-symbols-outlined text-base">add_circle</span>
            Request
          </a>
        </div>`;
    }

    init();
  </script>
</body>
</html>
