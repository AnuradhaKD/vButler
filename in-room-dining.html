<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — In-Room Dining | Browns Hotels & Resorts</title>
  <script>
    if(localStorage.getItem('vb:theme')==='dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52' }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <div id="app-header"></div>
  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-40 md:pb-8 max-w-4xl mx-auto">

      <!-- Page header -->
      <div class="flex items-center gap-3 mb-6">
        <a href="dining.html" class="inline-flex items-center justify-center w-9 h-9 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition text-slate-500 dark:text-slate-400">
          <span class="material-symbols-outlined text-xl">arrow_back</span>
        </a>
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Dining</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">In-Room Dining</h1>
        </div>
      </div>

      <!-- Info badge -->
      <div class="flex items-center gap-2 bg-[#003c52]/5 dark:bg-teal-900/20 border border-[#003c52]/20 dark:border-teal-800 rounded-xl p-4 mb-6 text-sm text-[#003c52] dark:text-teal-300">
        <span class="material-symbols-outlined text-base">schedule</span>
        Available 07:00–22:00 &middot; Estimated delivery 30–45 minutes &middot; Charges added to room folio
      </div>

      <!-- Loading -->
      <div id="loading-state">
        <div class="space-y-4">
          ${[1,2,3].map(()=>`<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-5 animate-pulse"><div class="h-5 bg-slate-200 dark:bg-slate-700 rounded w-1/3 mb-3"></div><div class="h-3 bg-slate-200 dark:bg-slate-700 rounded w-full mb-2"></div></div>`).join('')}
        </div>
      </div>

      <!-- Menu content -->
      <div id="menu-content" class="hidden md:flex md:gap-8">
        <div id="menu-sections" class="flex-1 space-y-8"></div>

        <!-- Desktop order summary sidebar -->
        <div class="hidden md:block w-80 shrink-0">
          <div class="sticky top-24">
            <div id="order-summary-desktop" class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5">
              <h3 class="font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-[#003c52] dark:text-teal-400">shopping_bag</span>
                Your Order
              </h3>
              <div id="order-items-desktop" class="space-y-2 mb-4 min-h-[60px]">
                <p class="text-sm text-slate-400 dark:text-slate-500">No items added yet.</p>
              </div>
              <div id="order-footer-desktop" class="hidden border-t border-slate-200 dark:border-slate-700 pt-4 space-y-3">
                <div class="flex justify-between text-sm font-bold text-slate-900 dark:text-white">
                  <span>Total</span>
                  <span id="order-total-desktop">Rs. 0</span>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Delivery Time</label>
                  <select id="delivery-time-desktop" class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#003c52]">
                    <option value="ASAP">As Soon As Possible</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Special Instructions</label>
                  <textarea id="instructions-desktop" rows="2" placeholder="Allergies, preferences..." class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#003c52] resize-none placeholder-slate-400"></textarea>
                </div>
                <button onclick="placeOrder('desktop')" class="w-full bg-[#003c52] text-white rounded-xl px-4 py-3 font-semibold hover:bg-[#004f6e] transition flex items-center justify-center gap-2 text-sm">
                  <span class="material-symbols-outlined text-base">send</span>
                  Place Order
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Mobile order drawer toggle -->
  <div id="mobile-order-bar" class="hidden md:hidden fixed bottom-16 inset-x-0 z-30 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-700 px-4 py-3 safe-area-pb">
    <button onclick="toggleMobileDrawer()" class="w-full bg-[#003c52] text-white rounded-xl px-5 py-3 font-semibold hover:bg-[#004f6e] transition flex items-center justify-between text-sm">
      <span class="flex items-center gap-2">
        <span class="material-symbols-outlined text-base">shopping_bag</span>
        View Order
      </span>
      <span id="mobile-cart-count" class="bg-white/20 rounded-full px-2 py-0.5 text-xs font-bold">0 items · Rs. 0</span>
    </button>
  </div>

  <!-- Mobile order drawer -->
  <div id="mobile-drawer" class="hidden fixed inset-0 z-50 md:hidden">
    <div onclick="toggleMobileDrawer()" class="absolute inset-0 bg-black/50"></div>
    <div class="absolute bottom-0 inset-x-0 bg-white dark:bg-slate-900 rounded-t-2xl p-5 max-h-[85vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-slate-900 dark:text-white text-lg">Your Order</h3>
        <button onclick="toggleMobileDrawer()" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
          <span class="material-symbols-outlined text-lg">close</span>
        </button>
      </div>
      <div id="order-items-mobile" class="space-y-2 mb-4 min-h-[60px]">
        <p class="text-sm text-slate-400">No items yet.</p>
      </div>
      <div id="order-footer-mobile" class="hidden border-t border-slate-200 dark:border-slate-700 pt-4 space-y-3">
        <div class="flex justify-between text-base font-bold text-slate-900 dark:text-white">
          <span>Total</span>
          <span id="order-total-mobile">Rs. 0</span>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Delivery Time</label>
          <select id="delivery-time-mobile" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#003c52]">
            <option value="ASAP">As Soon As Possible</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Special Instructions</label>
          <textarea id="instructions-mobile" rows="2" placeholder="Allergies, preferences..." class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-[#003c52] resize-none placeholder-slate-400"></textarea>
        </div>
        <button onclick="placeOrder('mobile')" class="w-full bg-[#003c52] text-white rounded-xl px-4 py-3 font-semibold hover:bg-[#004f6e] transition flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-base">send</span>
          Place Order
        </button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'dining');
    App.bottomNav.render('dining');

    let cart = {}; // { itemId: { item, quantity } }
    let propData = null;
    let currency = 'Rs.';

    async function init() {
      const reservation = App.reservations.getActive();
      const propertyId = reservation?.propertyId || 'newburge-ella';
      propData = await App.data.loadProperty(propertyId);

      document.getElementById('loading-state').classList.add('hidden');
      if (!propData) return;

      currency = propData.property.currencySymbol || 'Rs.';
      document.getElementById('menu-content').classList.remove('hidden');
      document.getElementById('mobile-order-bar').classList.remove('hidden');

      // Use The Summit restaurant menu for in-room dining
      const restaurant = propData.dining.restaurants[0];
      populateTimeSlots();
      renderMenu(restaurant.menu);
    }

    function populateTimeSlots() {
      ['delivery-time-desktop','delivery-time-mobile'].forEach(id => {
        const sel = document.getElementById(id);
        for (let h = 7; h <= 22; h++) {
          for (const m of ['00','30']) {
            if (h === 22 && m === '30') continue;
            const t = `${String(h).padStart(2,'0')}:${m}`;
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = t;
            sel.appendChild(opt);
          }
        }
      });
    }

    function renderMenu(menu) {
      const sections = document.getElementById('menu-sections');
      sections.innerHTML = menu.map(section => `
        <div>
          <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4 pb-2 border-b border-slate-200 dark:border-slate-700">${section.category}</h2>
          <div class="space-y-3">
            ${section.items.map(item => `
              <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-4 flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                  <h3 class="font-bold text-slate-900 dark:text-white text-sm">${item.name}</h3>
                  <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5 leading-relaxed">${item.description}</p>
                  <p class="mt-1 font-bold text-[#003c52] dark:text-teal-400 text-sm">${App.helpers.formatCurrency(item.price, currency)}</p>
                </div>
                <div class="flex items-center gap-2 shrink-0" id="ctrl-${item.id}">
                  <button onclick="addToCart(${JSON.stringify(item).replace(/"/g,'&quot;')})" class="flex items-center gap-1.5 bg-[#003c52] text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-[#004f6e] transition">
                    <span class="material-symbols-outlined text-sm">add</span>
                    Add
                  </button>
                </div>
              </div>`).join('')}
          </div>
        </div>`).join('');
    }

    function addToCart(item) {
      if (cart[item.id]) {
        cart[item.id].quantity++;
      } else {
        cart[item.id] = { item, quantity: 1 };
      }
      updateCartUI();
    }

    function updateQty(itemId, delta) {
      if (!cart[itemId]) return;
      cart[itemId].quantity += delta;
      if (cart[itemId].quantity <= 0) delete cart[itemId];
      updateCartUI();
    }

    function updateCartUI() {
      const items = Object.values(cart);
      const total = items.reduce((s,e) => s + e.item.price * e.quantity, 0);
      const count = items.reduce((s,e) => s + e.quantity, 0);

      // Update mobile bar
      document.getElementById('mobile-cart-count').textContent = `${count} item${count!==1?'s':''} · ${App.helpers.formatCurrency(total, currency)}`;

      const renderItems = () => items.length === 0
        ? `<p class="text-sm text-slate-400 dark:text-slate-500">No items added yet.</p>`
        : items.map(({item,quantity}) => `
            <div class="flex items-center justify-between gap-2 py-1.5 border-b border-slate-100 dark:border-slate-800 last:border-0">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-slate-900 dark:text-white truncate">${item.name}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">${App.helpers.formatCurrency(item.price * quantity, currency)}</p>
              </div>
              <div class="flex items-center gap-1 shrink-0">
                <button onclick="updateQty('${item.id}', -1)" class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-600 transition">
                  <span class="material-symbols-outlined text-sm">remove</span>
                </button>
                <span class="text-sm font-bold text-slate-900 dark:text-white w-5 text-center">${quantity}</span>
                <button onclick="updateQty('${item.id}', 1)" class="w-6 h-6 rounded-full bg-[#003c52] text-white flex items-center justify-center hover:bg-[#004f6e] transition">
                  <span class="material-symbols-outlined text-sm">add</span>
                </button>
              </div>
            </div>`).join('');

      ['desktop','mobile'].forEach(id => {
        const el = document.getElementById(`order-items-${id}`);
        if (el) el.innerHTML = renderItems();
        const footer = document.getElementById(`order-footer-${id}`);
        if (footer) { if (items.length > 0) footer.classList.remove('hidden'); else footer.classList.add('hidden'); }
        const totalEl = document.getElementById(`order-total-${id}`);
        if (totalEl) totalEl.textContent = App.helpers.formatCurrency(total, currency);
      });

      // Update inline +/- controls in menu
      document.querySelectorAll('[id^="ctrl-"]').forEach(ctrl => {
        const iid = ctrl.id.replace('ctrl-','');
        const entry = cart[iid];
        if (entry) {
          ctrl.innerHTML = `
            <div class="flex items-center gap-1.5">
              <button onclick="updateQty('${iid}', -1)" class="w-7 h-7 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-600 transition">
                <span class="material-symbols-outlined text-sm">remove</span>
              </button>
              <span class="text-sm font-bold text-slate-900 dark:text-white w-5 text-center">${entry.quantity}</span>
              <button onclick="updateQty('${iid}', 1)" class="w-7 h-7 rounded-full bg-[#003c52] text-white flex items-center justify-center hover:bg-[#004f6e] transition">
                <span class="material-symbols-outlined text-sm">add</span>
              </button>
            </div>`;
        } else {
          const itemData = findItem(iid);
          ctrl.innerHTML = `<button onclick="addToCart(${JSON.stringify(itemData||{}).replace(/"/g,'&quot;')})" class="flex items-center gap-1.5 bg-[#003c52] text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-[#004f6e] transition"><span class="material-symbols-outlined text-sm">add</span>Add</button>`;
        }
      });
    }

    function findItem(id) {
      if (!propData) return null;
      for (const section of propData.dining.restaurants[0].menu) {
        const found = section.items.find(i => i.id === id);
        if (found) return found;
      }
      return null;
    }

    function toggleMobileDrawer() {
      const drawer = document.getElementById('mobile-drawer');
      drawer.classList.toggle('hidden');
    }

    function placeOrder(source) {
      const reservation = App.reservations.getActive();
      const items = Object.values(cart);
      if (items.length === 0) { App.toast.show('Your order is empty.', 'warning'); return; }
      if (!reservation) { App.toast.show('No active reservation.', 'error'); return; }

      const total = items.reduce((s,e) => s + e.item.price * e.quantity, 0);
      const deliveryTime = document.getElementById(`delivery-time-${source}`).value;
      const instructions = document.getElementById(`instructions-${source}`).value.trim();
      const orderSummary = items.map(({item,quantity}) => `${item.name} ×${quantity}`).join(', ');

      App.confirm.show({
        title: 'Confirm Order',
        message: 'Your order will be delivered to your room (30–45 min). Charges added to folio.',
        items: [
          { label: 'Items', value: orderSummary },
          { label: 'Total', value: App.helpers.formatCurrency(total, currency) },
          { label: 'Delivery', value: deliveryTime },
          ...(instructions ? [{ label: 'Instructions', value: instructions }] : [])
        ],
        confirmText: 'Place Order',
        onConfirm() {
          App.requests.add({
            reservationId: reservation.id,
            serviceName: 'In-Room Dining Order',
            serviceId: 'inroom-dining',
            category: 'Dining',
            details: { items: orderSummary, total: App.helpers.formatCurrency(total, currency), deliveryTime },
            notes: instructions
          });
          App.toast.show('Order placed! Estimated delivery 30–45 minutes.', 'success');
          setTimeout(() => window.location.href = 'my-requests.html', 1400);
        }
      });
    }

    init();
  </script>
</body>
</html>
