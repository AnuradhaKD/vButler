<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — Complaints & Feedback | Browns Hotels & Resorts</title>
  <script>
    if(localStorage.getItem('vb:theme')==='dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52' }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <div id="app-header"></div>
  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-4xl mx-auto">

      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Support</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Complaints & Feedback</h1>
        </div>
        <a href="complaint-submit.html" class="flex items-center gap-2 bg-[#003c52] text-white rounded-xl px-4 py-2.5 text-sm font-semibold hover:bg-[#004f6e] transition">
          <span class="material-symbols-outlined text-base">add</span>
          New Complaint
        </a>
      </div>

      <!-- Status Tabs -->
      <div class="flex gap-2 border-b border-slate-200 dark:border-slate-700 mb-6 overflow-x-auto pb-px">
        <button data-tab="all" onclick="setTab('all')" class="tab-btn shrink-0 px-4 py-2.5 text-sm font-semibold border-b-2 transition border-[#003c52] text-[#003c52] dark:border-teal-400 dark:text-teal-400">All</button>
        <button data-tab="open" onclick="setTab('open')" class="tab-btn shrink-0 px-4 py-2.5 text-sm font-semibold border-b-2 transition border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700">Open</button>
        <button data-tab="inprogress" onclick="setTab('inprogress')" class="tab-btn shrink-0 px-4 py-2.5 text-sm font-semibold border-b-2 transition border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700">In Progress</button>
        <button data-tab="resolved" onclick="setTab('resolved')" class="tab-btn shrink-0 px-4 py-2.5 text-sm font-semibold border-b-2 transition border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700">Resolved</button>
      </div>

      <!-- Complaints List -->
      <div id="complaints-list" class="space-y-4"></div>

      <!-- Empty State -->
      <div id="empty-state" class="hidden text-center py-16">
        <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600 mb-3 block">support_agent</span>
        <p class="text-slate-600 dark:text-slate-400 font-semibold">No complaints found</p>
        <p class="text-slate-400 dark:text-slate-500 text-sm mt-1 mb-4">If you have any issues, we'd love to help</p>
        <a href="complaint-submit.html" class="inline-flex items-center gap-2 bg-[#003c52] text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-[#004f6e] transition">
          <span class="material-symbols-outlined text-base">add</span>Submit a Complaint
        </a>
      </div>

      <!-- Post-Stay Feedback -->
      <div id="feedback-section" class="hidden mt-8">
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
          <h2 class="font-bold text-slate-900 dark:text-white text-lg mb-1">Post-Stay Feedback</h2>
          <p class="text-slate-500 dark:text-slate-400 text-sm mb-4">How was your stay? Your feedback helps us improve.</p>
          <div class="flex gap-2 mb-4" id="star-rating">
            <button class="star-btn text-3xl text-slate-300 dark:text-slate-600 hover:text-amber-400 transition" data-star="1" onclick="setStar(1)">&#9733;</button>
            <button class="star-btn text-3xl text-slate-300 dark:text-slate-600 hover:text-amber-400 transition" data-star="2" onclick="setStar(2)">&#9733;</button>
            <button class="star-btn text-3xl text-slate-300 dark:text-slate-600 hover:text-amber-400 transition" data-star="3" onclick="setStar(3)">&#9733;</button>
            <button class="star-btn text-3xl text-slate-300 dark:text-slate-600 hover:text-amber-400 transition" data-star="4" onclick="setStar(4)">&#9733;</button>
            <button class="star-btn text-3xl text-slate-300 dark:text-slate-600 hover:text-amber-400 transition" data-star="5" onclick="setStar(5)">&#9733;</button>
          </div>
          <textarea id="feedback-text" rows="4" placeholder="Share your experience…" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#003c52] text-sm resize-none mb-4"></textarea>
          <button onclick="submitFeedback()" class="bg-[#003c52] text-white rounded-xl px-6 py-3 font-semibold hover:bg-[#004f6e] transition text-sm">Submit Feedback</button>
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'complaints');
    App.bottomNav.render('complaints');

    const activeRes = App.reservations.getActive();
    let allComplaints = [];
    let currentTab = 'all';
    let selectedStar = 0;

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const isActive = btn.dataset.tab === tab;
        btn.className = `tab-btn shrink-0 px-4 py-2.5 text-sm font-semibold border-b-2 transition ${isActive
          ? 'border-[#003c52] text-[#003c52] dark:border-teal-400 dark:text-teal-400'
          : 'border-transparent text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`;
      });
      renderComplaints();
    }

    function renderComplaints() {
      const filtered = currentTab === 'all' ? allComplaints : allComplaints.filter(c => c.status === currentTab);
      const list = document.getElementById('complaints-list');
      const empty = document.getElementById('empty-state');

      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      list.innerHTML = filtered.map(c => `
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-5 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="flex items-center gap-2">
              <span class="text-xs font-mono font-bold text-[#003c52] dark:text-teal-400">${c.ref}</span>
              ${App.helpers.statusBadge(c.status)}
            </div>
            <span class="text-xs text-slate-400 dark:text-slate-500 shrink-0">${App.helpers.timeAgo(c.createdAt)}</span>
          </div>
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase">${c.category}</span>
            ${c.subcategory ? `<span class="text-slate-300 dark:text-slate-600">·</span><span class="text-xs text-slate-500 dark:text-slate-400">${c.subcategory}</span>` : ''}
          </div>
          <p class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed line-clamp-2 mb-3">${c.description}</p>
          <a href="complaint-detail.html?id=${c.id}" class="inline-flex items-center gap-1 text-sm font-semibold text-[#003c52] dark:text-teal-400 hover:underline">
            View Details <span class="material-symbols-outlined text-base">arrow_forward</span>
          </a>
        </div>`).join('');
    }

    function setStar(n) {
      selectedStar = n;
      document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.style.color = i < n ? '#f59e0b' : '';
        btn.className = `star-btn text-3xl ${i < n ? 'text-amber-400' : 'text-slate-300 dark:text-slate-600'} hover:text-amber-400 transition`;
      });
    }

    function submitFeedback() {
      if (selectedStar === 0) { App.toast.show('Please select a star rating', 'warning'); return; }
      const text = document.getElementById('feedback-text').value;
      const feedback = { rating: selectedStar, comment: text, submittedAt: new Date().toISOString(), reservationId: activeRes?.id };
      App.storage.set('vb:postStayFeedback', feedback);
      App.toast.show('Thank you for your feedback!', 'success');
      document.getElementById('feedback-section').innerHTML = `<div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl p-6 text-center"><span class="material-symbols-outlined text-4xl text-green-600 dark:text-green-400 mb-2 block" style="font-variation-settings:'FILL' 1">check_circle</span><p class="font-bold text-green-800 dark:text-green-300">Feedback Submitted!</p><p class="text-sm text-green-700 dark:text-green-400 mt-1">Thank you for your ${selectedStar}-star rating.</p></div>`;
    }

    (() => {
      allComplaints = activeRes ? App.complaints.getAll(activeRes.id) : [];
      renderComplaints();
      // Post-stay feedback
      if (activeRes?.status === 'past') {
        document.getElementById('feedback-section').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
