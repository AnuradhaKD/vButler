<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — My Requests | Browns Hotels & Resorts</title>
  <script>
    if(localStorage.getItem('vb:theme')==='dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52' }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <div id="app-header"></div>
  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>
    <main class="flex-1 p-4 md:p-8 pb-24 md:pb-8 max-w-4xl mx-auto">

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Your Activity</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">My Requests</h1>
        </div>
        <a href="services.html" class="flex items-center gap-2 bg-[#003c52] text-white rounded-xl px-4 py-2.5 text-sm font-semibold hover:bg-[#004f6e] transition">
          <span class="material-symbols-outlined text-base">add</span>
          New Request
        </a>
      </div>

      <div id="requests-content"></div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    App.auth.requireAuth();
    App.header.render('app-header');
    App.sidebar.render('app-sidebar', 'services');
    App.bottomNav.render('services');

    function init() {
      const reservation = App.reservations.getActive();
      if (!reservation) {
        document.getElementById('requests-content').innerHTML = `
          <div class="text-center py-20">
            <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600">hotel_class</span>
            <p class="mt-4 font-semibold text-slate-900 dark:text-white">No active reservation</p>
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Link a reservation to see your requests.</p>
          </div>`;
        return;
      }

      const allRequests = App.requests.getAll(reservation.id);

      if (allRequests.length === 0) {
        document.getElementById('requests-content').innerHTML = `
          <div class="text-center py-20">
            <div class="w-20 h-20 rounded-2xl bg-[#003c52]/10 dark:bg-teal-900/20 flex items-center justify-center mx-auto mb-4">
              <span class="material-symbols-outlined text-4xl text-[#003c52] dark:text-teal-400">assignment</span>
            </div>
            <p class="font-bold text-lg text-slate-900 dark:text-white mb-2">No requests yet</p>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Browse our services and submit your first request.</p>
            <a href="services.html" class="inline-flex items-center gap-2 bg-[#003c52] text-white rounded-xl px-6 py-3 font-semibold hover:bg-[#004f6e] transition">
              <span class="material-symbols-outlined text-base">room_service</span>
              Browse Services
            </a>
          </div>`;
        return;
      }

      const groups = {
        pending:    { label: 'Pending',     icon: 'hourglass_empty', items: [] },
        inprogress: { label: 'In Progress', icon: 'sync',            items: [] },
        completed:  { label: 'Completed',   icon: 'check_circle',    items: [] },
        cancelled:  { label: 'Cancelled',   icon: 'cancel',          items: [] },
      };

      allRequests.forEach(req => {
        const key = req.status === 'in-progress' ? 'inprogress' : (groups[req.status] ? req.status : 'pending');
        if (groups[key]) groups[key].items.push(req);
      });

      let html = '';
      Object.entries(groups).forEach(([key, group]) => {
        if (group.items.length === 0) return;
        html += `
          <div class="mb-8">
            <div class="flex items-center gap-2 mb-3">
              <span class="material-symbols-outlined text-slate-400 dark:text-slate-500">${group.icon}</span>
              <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">${group.label}</h2>
              <span class="ml-1 text-xs font-bold bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-full px-2 py-0.5">${group.items.length}</span>
            </div>
            <div class="space-y-3">
              ${group.items.map(req => renderRequestCard(req)).join('')}
            </div>
          </div>`;
      });

      document.getElementById('requests-content').innerHTML = html;
    }

    function renderRequestCard(req) {
      const detailsHtml = req.details && Object.keys(req.details).length > 0
        ? `<div class="mt-2 flex flex-wrap gap-3 text-xs text-slate-500 dark:text-slate-400">
            ${Object.entries(req.details).filter(([k,v])=>v).map(([k,v])=>`<span class="capitalize">${k.replace(/([A-Z])/g,' $1').trim()}: <strong class="text-slate-700 dark:text-slate-300">${v}</strong></span>`).join('')}
           </div>` : '';
      const notesHtml = req.notes ? `<p class="mt-2 text-xs text-slate-500 dark:text-slate-400 italic">"${req.notes}"</p>` : '';

      return `
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">${req.category || ''}</span>
              </div>
              <h3 class="font-bold text-slate-900 dark:text-white text-sm">${req.serviceName}</h3>
              ${detailsHtml}
              ${notesHtml}
              <p class="mt-2 text-xs text-slate-400 dark:text-slate-500">${App.helpers.timeAgo(req.createdAt)} &middot; ${req.id}</p>
            </div>
            <div class="shrink-0">${App.helpers.statusBadge(req.status)}</div>
          </div>
        </div>`;
    }

    init();
  </script>
</body>
</html>
