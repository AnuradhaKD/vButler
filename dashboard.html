<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/images/destinity-inspire.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Destinity vButler — Dashboard | Browns Hotels & Resorts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] },
          colors: { primary: '#003c52', 'bg-light': '#f5f8f8', 'bg-dark': '#0f1e23' }
        }
      }
    }
  </script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fill-icon { font-variation-settings: 'FILL' 1; }
  </style>
</head>
<body class="bg-[#f5f8f8] dark:bg-[#0f1e23] font-sans min-h-screen">
  <script>
    if (localStorage.getItem('vb:theme') === 'dark' || (!localStorage.getItem('vb:theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
  </script>

  <div id="app-header"></div>

  <div class="flex min-h-[calc(100vh-4rem)]">
    <div id="app-sidebar"></div>

    <main class="flex-1 pb-24 md:pb-8 overflow-x-hidden min-w-0">

      <!-- Reservation Context Bar -->
      <div id="reservation-bar" class="px-4 md:px-8 pt-4 md:pt-6 max-w-5xl mx-auto"></div>

      <!-- Hero Banner -->
      <div id="hero-section" class="px-4 md:px-8 mt-4 max-w-5xl mx-auto"></div>

      <!-- Quick Actions -->
      <section class="px-4 md:px-8 mt-8 max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">What can we help with?</p>
            <h2 class="text-xl font-bold text-slate-900 dark:text-white">Quick Actions</h2>
          </div>
        </div>
        <div id="quick-actions" class="grid grid-cols-2 sm:grid-cols-4 gap-3 md:gap-4"></div>
      </section>

      <!-- Promotions -->
      <section class="mt-8 max-w-5xl mx-auto overflow-hidden">
        <div class="px-4 md:px-8 mb-4">
          <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">For You</p>
          <h2 class="text-xl font-bold text-slate-900 dark:text-white">Exclusive Offers</h2>
        </div>
        <div id="promotions-carousel" class="flex gap-4 overflow-x-auto px-4 md:px-8 pb-4 hide-scrollbar"></div>
      </section>

      <!-- Recent Requests -->
      <section class="px-4 md:px-8 mt-6 mb-4 max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1">Your Activity</p>
            <h2 class="text-xl font-bold text-slate-900 dark:text-white">Recent Requests</h2>
          </div>
          <a href="my-requests.html" class="text-sm font-semibold text-[#003c52] dark:text-teal-400 hover:underline flex items-center gap-1">
            View all <span class="material-symbols-outlined text-base">chevron_right</span>
          </a>
        </div>
        <div id="recent-requests"></div>
      </section>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function init() {
      App.auth.requireAuth();
      App.header.render('app-header');
      App.sidebar.render('app-sidebar', 'dashboard');
      App.bottomNav.render('dashboard');

      const session = App.auth.getSession();

      // Load reservations if needed
      let activeRes = App.reservations.getActive();
      if (!activeRes) {
        try {
          const data = await App.data.loadReservations();
          if (data) {
            const guestRes = data.reservations.filter(r => r.guestEmail === session.email);
            App.reservations.save(guestRes);
            if (guestRes.length > 0) App.reservations.setActive(guestRes[0].id);
            activeRes = App.reservations.getActive();
          }
        } catch(e) { console.error(e); }
      }

      renderReservationBar(activeRes);
      await renderHero(activeRes);
      await renderQuickActions(activeRes);
      await renderPromotions(activeRes);
      renderRecentRequests(activeRes);
    }

    function renderReservationBar(res) {
      const el = document.getElementById('reservation-bar');
      if (!res) {
        el.innerHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-slate-400">hotel</span>
              <span class="text-sm text-slate-500 dark:text-slate-400">No active reservation found.</span>
            </div>
            <a href="reservations.html" class="text-xs font-semibold text-[#003c52] dark:text-teal-400">View reservations →</a>
          </div>`;
        return;
      }
      el.innerHTML = `
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-[#003c52]/20 dark:border-teal-900/50 p-4 flex flex-wrap items-center justify-between gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-9 h-9 rounded-lg bg-[#003c52]/10 dark:bg-teal-900/30 flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-lg text-[#003c52] dark:text-teal-400">hotel</span>
            </div>
            <div class="min-w-0">
              <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Active Reservation · <span class="text-[#003c52] dark:text-teal-400 font-semibold">${res.bookingReference}</span></p>
              <p class="font-semibold text-slate-900 dark:text-white text-sm truncate">${res.propertyName}</p>
              <p class="text-xs text-slate-500 dark:text-slate-400 truncate">${App.helpers.formatDate(res.checkIn)} → ${App.helpers.formatDate(res.checkOut)} · ${res.roomType}</p>
            </div>
          </div>
          <a href="reservations.html" class="flex-shrink-0 inline-flex items-center gap-1 text-xs font-semibold text-[#003c52] dark:text-teal-400 border border-[#003c52]/30 dark:border-teal-700 px-3 py-1.5 rounded-lg hover:bg-[#003c52]/5 transition">
            <span class="material-symbols-outlined text-sm">swap_horiz</span> Switch Stay
          </a>
        </div>`;
    }

    async function renderHero(res) {
      const el = document.getElementById('hero-section');
      const profile = App.auth.getGuest() || {};
      const firstName = profile.firstName || 'Guest';

      let heroImage = 'https://images.unsplash.com/photo-1582719508461-905c673771fd?w=1200';
      let tagline = 'Your stay. Your way.';
      let propertyName = 'Browns Hotels & Resorts';

      if (res) {
        propertyName = res.propertyName;
        try {
          const propData = await App.data.loadProperty(res.propertyId);
          if (propData) {
            heroImage = propData.property.heroImages?.[0] || heroImage;
            tagline = propData.property.tagline || tagline;
          }
        } catch(e) {}
      }

      const countdown = res ? App.helpers.stayCountdown(res.checkIn) : '';
      const nightsText = res ? (() => {
        const diff = Math.round((new Date(res.checkOut) - new Date(res.checkIn)) / 86400000);
        return diff + ' night' + (diff !== 1 ? 's' : '');
      })() : '';

      el.innerHTML = `
        <div class="relative rounded-2xl overflow-hidden h-52 md:h-72">
          <img src="${heroImage}" alt="${propertyName}" class="absolute inset-0 w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/40 to-black/10"></div>
          <div class="absolute inset-0 p-6 md:p-8 flex flex-col justify-end">
            <p class="text-white/70 text-xs font-semibold uppercase tracking-widest mb-1">${tagline}</p>
            <h1 class="font-serif text-white text-2xl md:text-3xl leading-tight mb-3">
              Welcome back, ${firstName}!
            </h1>
            ${res ? `
            <div class="flex flex-wrap gap-2">
              <span class="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur text-white text-xs font-semibold px-3 py-1.5 rounded-full border border-white/30">
                <span class="material-symbols-outlined text-sm">schedule</span> Check-in ${countdown}
              </span>
              <span class="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur text-white text-xs font-semibold px-3 py-1.5 rounded-full border border-white/30">
                <span class="material-symbols-outlined text-sm">bed</span> ${nightsText}
              </span>
              ${res.specialRequests ? `
              <span class="inline-flex items-center gap-1.5 bg-amber-500/80 backdrop-blur text-white text-xs font-semibold px-3 py-1.5 rounded-full">
                <span class="material-symbols-outlined text-sm">star</span> ${res.specialRequests.split('.')[0]}
              </span>` : ''}
            </div>` : ''}
          </div>
        </div>`;
    }

    async function renderQuickActions(res) {
      const el = document.getElementById('quick-actions');
      let actions = [
        { id: 'services',     label: 'Services',      icon: 'room_service',    route: 'services.html' },
        { id: 'dining',       label: 'Dining',         icon: 'restaurant',      route: 'dining.html' },
        { id: 'wellness',     label: 'Wellness',       icon: 'spa',             route: 'wellness.html' },
        { id: 'my-bill',      label: 'My Bill',        icon: 'receipt_long',    route: 'billing.html' },
        { id: 'experiences',  label: 'Experiences',    icon: 'hiking',          route: 'experiences.html' },
        { id: 'complaints',   label: 'Feedback',       icon: 'support_agent',   route: 'complaints.html' },
        { id: 'housekeeping', label: 'Room Requests',  icon: 'bed',             route: 'housekeeping.html' },
        { id: 'explore',      label: 'Explore',        icon: 'explore',         route: 'local-explore.html' }
      ];

      if (res) {
        try {
          const propData = await App.data.loadProperty(res.propertyId);
          if (propData?.quickActions) actions = propData.quickActions;
        } catch(e) {}
      }

      el.innerHTML = actions.map(a => `
        <a href="${a.route}" class="group bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-3 md:p-4 flex flex-col items-center gap-2 hover:shadow-md hover:border-[#003c52]/30 dark:hover:border-teal-700 transition-all text-center cursor-pointer">
          <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-[#003c52]/8 dark:bg-teal-900/20 flex items-center justify-center group-hover:bg-[#003c52]/15 transition-colors">
            <span class="material-symbols-outlined text-xl md:text-2xl text-[#003c52] dark:text-teal-400">${a.icon}</span>
          </div>
          <span class="text-[10px] md:text-xs font-semibold text-slate-700 dark:text-slate-300 leading-tight">${a.label}</span>
        </a>`).join('');
    }

    async function renderPromotions(activeRes) {
      const el = document.getElementById('promotions-carousel');
      try {
        const chain = await App.data.loadChain();
        if (!chain?.promotions?.length) { el.closest('section').classList.add('hidden'); return; }

        el.innerHTML = chain.promotions.map(p => `
          <div class="relative flex-shrink-0 w-72 md:w-80 rounded-2xl overflow-hidden h-44 group cursor-pointer hover:shadow-lg transition-shadow">
            <img src="${p.imageUrl}" alt="${p.title}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            <div class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/30 to-transparent"></div>
            <div class="absolute inset-0 p-5 flex flex-col justify-end">
              <h3 class="text-white font-bold text-base leading-tight mb-1">${p.title}</h3>
              <p class="text-white/75 text-xs leading-relaxed mb-3 line-clamp-2">${p.description}</p>
              <a href="${p.ctaUrl}" class="inline-flex items-center gap-1 text-xs font-bold text-white bg-white/20 backdrop-blur border border-white/30 px-3 py-1.5 rounded-full hover:bg-white/30 transition w-fit">
                ${p.ctaLabel} <span class="material-symbols-outlined text-xs">arrow_forward</span>
              </a>
            </div>
          </div>`).join('');
      } catch(e) {
        el.closest('section').classList.add('hidden');
      }
    }

    function renderRecentRequests(res) {
      const el = document.getElementById('recent-requests');
      if (!res) {
        el.innerHTML = `<div class="text-center py-10 text-slate-400 dark:text-slate-500 text-sm">No active stay to show requests for.</div>`;
        return;
      }

      const reqs = App.requests.getAll(res.id).slice(0, 3);

      if (!reqs.length) {
        el.innerHTML = `
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 p-8 text-center">
            <span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-600 mb-3 block">inbox</span>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">No requests yet</p>
            <p class="text-slate-400 dark:text-slate-500 text-xs">Use the quick actions above to request services.</p>
          </div>`;
        return;
      }

      el.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 divide-y divide-slate-100 dark:divide-slate-800 overflow-hidden">
        ${reqs.map(req => `
          <div class="p-4 flex items-center justify-between gap-3 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-9 h-9 rounded-lg bg-[#003c52]/8 dark:bg-teal-900/20 flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-lg text-[#003c52] dark:text-teal-400">room_service</span>
              </div>
              <div class="min-w-0">
                <p class="font-semibold text-slate-900 dark:text-white text-sm truncate">${req.serviceName || req.type || 'Service Request'}</p>
                <p class="text-xs text-slate-400 dark:text-slate-500">${App.helpers.timeAgo(req.createdAt)}</p>
              </div>
            </div>
            ${App.helpers.statusBadge(req.status)}
          </div>`).join('')}
      </div>`;
    }

    init();
  </script>
</body>
</html>
